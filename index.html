<script>
var API_URL='https://kvdb.io/tsum_market_2024';
var P=[],A=[],B=[],M=[],AN=[],chatP=[],tradeP=[],PASS='acer2026',myId='',isAdmin=false;

function getMyId(){var id=localStorage.getItem('tsum_myId');if(!id){id='usr_'+Date.now().toString(36)+'_'+Math.random().toString(36).substring(2,8);localStorage.setItem('tsum_myId',id);}return id;}

async function loadFromServer(){
    try{
        var r=await fetch(API_URL);
        if(!r.ok)throw new Error('Ошибка');
        var data=await r.json();
        if(data.P)P=data.P;if(data.A)A=data.A;
        if(data.B)B=data.B;if(data.M)M=data.M;
        if(data.AN)AN=data.AN;
        document.getElementById('connStatus').innerHTML='🟢';document.getElementById('connStatus').className='status status-online';
    }catch(e){document.getElementById('connStatus').innerHTML='🔴';document.getElementById('connStatus').className='status status-offline';}
    myId=getMyId();document.getElementById('myIdDisplay').textContent=myId;showApproved();showAnnounce();
}

async function saveToServer(){
    try{
        var r=await fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({P:P,A:A,B:B,M:M,AN:AN})});
        return r.ok;
    }catch(e){return false;}
}

function addFiles(input,type){var files=input.files;var arr=type==='chat'?chatP:tradeP;if(arr.length+files.length>5){alert('Макс 5');return;}for(var i=0;i<files.length;i++){var f=files[i];if(f.size>5*1024*1024){alert('>5MB');continue;}var reader=new FileReader();reader.onload=function(e){arr.push({name:f.name,data:e.target.result,id:Date.now()+Math.random()});showFiles(type);};reader.readAsDataURL(f);}}
function showFiles(type){var arr=type==='chat'?chatP:tradeP;var div=document.getElementById(type==='chat'?'chatFiles':'tradeFiles');var h='';for(var i=0;i<arr.length;i++){h+='<div class="file-chip">📷 '+(i+1)+' <button onclick="removeFile(\''+type+'\','+i+')">✕</button></div>';}div.innerHTML=h;}
function removeFile(type,index){if(type==='chat')chatP.splice(index,1);else tradeP.splice(index,1);showFiles(type);}

async function submitReview(){
    var author=document.getElementById('myRoblox').value.trim();var roblox=document.getElementById('robloxNick').value.trim();
    var discord=document.getElementById('discordNick').value.trim();var rating=document.getElementById('rating').value;
    var text=document.getElementById('reviewText').value.trim();var msg=document.getElementById('submitMsg');
    if(!author||!roblox||!text){msg.innerHTML='<div class="alert alert-error">Заполни все поля!</div>';return;}
    for(var i=0;i<B.length;i++){if(B[i]===myId){msg.innerHTML='<div class="alert alert-error">Вы забанены!</div>';return;}}
    for(var i=0;i<P.length;i++){if(P[i].roblox.toLowerCase()===roblox.toLowerCase()){msg.innerHTML='<div class="alert alert-warning">Уже на модерации!</div>';return;}}
    for(var i=0;i<A.length;i++){if(A[i].roblox.toLowerCase()===roblox.toLowerCase()){msg.innerHTML='<div class="alert alert-success">Уже одобрен!</div>';return;}}
    P.unshift({id:Date.now(),author:author,authorId:myId,roblox:roblox,discord:discord,rating:rating,text:text,status:'pending',date:new Date().toISOString(),chatPhotos:[],tradePhotos:[]});
    var ok=await saveToServer();
    document.getElementById('reviewText').value='';chatP=[];tradeP=[];showFiles('chat');showFiles('trade');
    if(ok){msg.innerHTML='<div class="alert alert-success">✅ Отправлено!</div>';loadFromServer();}
    else{msg.innerHTML='<div class="alert alert-error">❌ Ошибка!</div>';}
}

function reviewCard(r,showStatus,showDelete){
    var badge='',delBtn='';
    if(showStatus){if(r.status==='pending')badge='<span class="badge badge-pending">⏳</span>';else badge='<span class="badge badge-approved">✅</span>';}
    if(showDelete)delBtn=' <button class="btn btn-red btn-sm" onclick="deleteReview(\''+r.id+'\')">🗑️</button>';
    return '<div class="review-card"><div class="review-header"><div class="user-info"><div class="avatar">'+r.roblox.substring(0,2).toUpperCase()+'</div><div><h4>🎮 '+r.roblox+'</h4></div></div>'+badge+delBtn+'</div><div class="review-text">⭐'+r.rating+' — '+r.text+'</div><div style="font-size:10px;color:#888;">Автор: '+r.author+'</div><div class="review-footer">📅 '+new Date(r.date).toLocaleString('ru-RU')+'</div></div>';
}

async function deleteReview(id){if(!confirm('Удалить?'))return;var np=[],na=[];for(var i=0;i<P.length;i++){if(P[i].id!=id)np.push(P[i]);}for(var i=0;i<A.length;i++){if(A[i].id!=id)na.push(A[i]);}P=np;A=na;await saveToServer();showApproved();showAllReviews();showPending();}
function showApproved(){var q=document.getElementById('searchReviews').value.toLowerCase();var f=[];for(var i=0;i<A.length;i++){var mu=false;for(var j=0;j<M.length;j++){if(M[j]===A[i].authorId)mu=true;}if(!mu)f.push(A[i]);}if(q){var t=[];for(var i=0;i<f.length;i++){if(f[i].roblox.toLowerCase().indexOf(q)>=0)t.push(f[i]);}f=t;}document.getElementById('reviewCount').textContent=f.length;var d=document.getElementById('reviewsList');if(f.length===0){d.innerHTML='<div class="empty">📭 Нет отзывов</div>';return;}var h='';for(var i=0;i<f.length;i++){h+=reviewCard(f[i],false,false);}d.innerHTML=h;}
function openPhoto(src){document.getElementById('modalImage').src=src;document.getElementById('photoModal').classList.add('show');}
function showAnnounce(){var d=document.getElementById('announceList');if(AN.length===0){d.innerHTML='<div class="empty">Нет объявлений</div>';return;}var h='';for(var i=AN.length-1;i>=0;i--){h+='<div class="announce-card"><div class="card-title">📢 '+AN[i].title+'</div><div style="color:#ccc;font-size:13px;">'+AN[i].text+'</div><div style="font-size:10px;color:#888;margin-top:8px;">📅 '+new Date(AN[i].date).toLocaleString('ru-RU')+'</div></div>';}d.innerHTML=h;}
async function postAnnounce(){if(!isAdmin)return;var t=document.getElementById('announceTitle').value.trim();var x=document.getElementById('announceText').value.trim();if(!t||!x)return;AN.push({title:t,text:x,date:new Date().toISOString()});await saveToServer();showAnnounce();document.getElementById('announceTitle').value='';document.getElementById('announceText').value='';}
function adminLogin(){if(document.getElementById('adminPass').value!==PASS){document.getElementById('adminMsg').innerHTML='<div class="alert alert-error">Неверный пароль!</div>';return;}isAdmin=true;document.getElementById('adminMsg').innerHTML='<div class="alert alert-success">Доступ</div>';document.getElementById('adminPanel').style.display='block';showPending();showBans();showAllReviews();}
function showPending(){document.getElementById('pendingCount').textContent=P.length;var d=document.getElementById('pendingList');if(P.length===0){d.innerHTML='<div class="empty">Нет заявок</div>';return;}var h='';for(var i=0;i<P.length;i++){h+=reviewCard(P[i],true,true);h+='<div style="display:flex;gap:10px;margin-top:-8px;margin-bottom:10px;"><button class="btn btn-green btn-sm" style="flex:1;" onclick="approve('+P[i].id+')">✅ ОДОБРИТЬ</button><button class="btn btn-red btn-sm" style="flex:1;" onclick="reject('+P[i].id+')">❌ ОТКЛОНИТЬ</button></div>';}d.innerHTML=h;}
async function approve(id){var f=null,np=[];for(var i=0;i<P.length;i++){if(P[i].id===id)f=P[i];else np.push(P[i]);}if(f){P=np;f.status='approved';A.unshift(f);await saveToServer();showPending();showApproved();showAllReviews();}}
async function reject(id){var np=[];for(var i=0;i<P.length;i++){if(P[i].id!==id)np.push(P[i]);}P=np;await saveToServer();showPending();showAllReviews();}
function showAllReviews(){var q=document.getElementById('adminSearchReviews').value.toLowerCase();var all=P.concat(A);if(q){var t=[];for(var i=0;i<all.length;i++){if(all[i].roblox.toLowerCase().indexOf(q)>=0||all[i].author.toLowerCase().indexOf(q)>=0)t.push(all[i]);}all=t;}var d=document.getElementById('allReviewsAdmin');if(all.length===0){d.innerHTML='<div class="empty">Нет отзывов</div>';return;}var h='';for(var i=0;i<all.length;i++){h+=reviewCard(all[i],true,true);}d.innerHTML=h;}
async function addBan(){var id=document.getElementById('banId').value.trim();var t=document.getElementById('banType').value;if(!id)return;if(t==='ban')B.push(id);else M.push(id);await saveToServer();showBans();showApproved();document.getElementById('banId').value='';}
async function removeBan(){var id=document.getElementById('banId').value.trim();if(!id)return;var nb=[],nm=[];for(var i=0;i<B.length;i++){if(B[i]!==id)nb.push(B[i]);}for(var i=0;i<M.length;i++){if(M[i]!==id)nm.push(M[i]);}B=nb;M=nm;await saveToServer();showBans();showApproved();document.getElementById('banId').value='';}
function showBans(){var all=[];for(var i=0;i<B.length;i++)all.push({id:B[i],t:'🔴 БАН'});for(var i=0;i<M.length;i++)all.push({id:M[i],t:'🟠 МУТ'});var d=document.getElementById('banList');if(all.length===0){d.innerHTML='<div style="color:#888;">Нет банов</div>';return;}var h='';for(var i=0;i<all.length;i++){h+='<div class="ban-item"><span>🆔 '+all[i].id+'</span><span>'+all[i].t+'</span></div>';}d.innerHTML=h;}
function switchTab(name){var tabs=['reviews','announce','submit','rules','admin'];for(var i=0;i<tabs.length;i++){document.getElementById('nav-'+tabs[i]).classList.remove('active');document.getElementById('tab-'+tabs[i]).classList.remove('active');}document.getElementById('nav-'+name).classList.add('active');document.getElementById('tab-'+name).classList.add('active');if(name==='reviews')showApproved();if(name==='announce')showAnnounce();if(name==='admin'){if(isAdmin){showPending();showBans();showAllReviews();}}}
document.getElementById('nav-reviews').onclick=function(){switchTab('reviews');};
document.getElementById('nav-announce').onclick=function(){switchTab('announce');};
document.getElementById('nav-submit').onclick=function(){switchTab('submit');};
document.getElementById('nav-rules').onclick=function(){switchTab('rules');};
document.getElementById('nav-admin').onclick=function(){switchTab('admin');};

loadFromServer();
setInterval(loadFromServer,15000);
</script>
