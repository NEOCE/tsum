<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSUM MARKET</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;font-family:Arial;color:#fff;min-height:100vh;padding-bottom:60px}
.header{background:#111;border-bottom:2px solid #e91e63;padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.logo{font-size:20px;font-weight:bold;color:#e91e63}
.nav{display:flex;gap:5px;flex-wrap:wrap}
.nav button{padding:8px 12px;border:1px solid #333;background:transparent;color:#888;border-radius:20px;cursor:pointer;font-size:11px}
.nav button.active{background:#e91e63;color:#fff;border-color:#e91e63}
.container{max-width:900px;margin:0 auto;padding:20px}
.tab{display:none}.tab.active{display:block}
.card{background:#16161f;border:1px solid #252530;border-radius:14px;padding:18px;margin-bottom:18px}
.card-title{font-size:17px;font-weight:bold;color:#e91e63;margin-bottom:12px}
label{display:block;color:#888;font-size:10px;margin-bottom:4px;text-transform:uppercase}
input,textarea,select{width:100%;padding:10px;background:#0d0d15;border:1px solid #252530;border-radius:8px;color:#fff;font-size:14px;outline:none;margin-bottom:8px;font-family:Arial}
input:focus,textarea:focus,select:focus{border-color:#e91e63}textarea{min-height:60px;resize:vertical}
.btn{padding:12px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:14px;width:100%;margin-bottom:8px}
.btn-pink{background:#e91e63;color:#fff}.btn-green{background:#4caf50;color:#fff}.btn-red{background:#f44336;color:#fff}
.btn-sm{padding:6px 12px;font-size:11px;width:auto;display:inline-block}
.badge{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:bold}
.badge-pending{background:rgba(255,152,0,0.2);color:#ff9800}.badge-approved{background:rgba(76,175,80,0.2);color:#4caf50}
.upload-area{border:2px dashed #333;border-radius:12px;padding:15px;text-align:center;cursor:pointer;margin-bottom:8px}
.upload-area:hover{border-color:#e91e63}.upload-icon{font-size:30px;margin-bottom:5px}
.file-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.file-chip{background:#0d0d15;border:1px solid #333;border-radius:6px;padding:4px 8px;font-size:10px;display:flex;align-items:center;gap:5px}
.file-chip button{background:none;border:none;color:#f44336;cursor:pointer;font-size:12px}
.photo-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.photo-preview img{width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid #333;cursor:pointer}
.review-card{background:#16161f;border:1px solid #252530;border-radius:12px;padding:15px;margin-bottom:10px}
.review-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.user-info{display:flex;align-items:center;gap:8px}
.avatar{width:35px;height:35px;border-radius:50%;background:#e91e63;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;flex-shrink:0}
.user-info h4{font-size:13px;color:#e91e63}.user-info span{font-size:10px;color:#888}
.review-text{color:#ccc;font-size:12px;line-height:1.4;margin-bottom:6px}
.review-footer{font-size:9px;color:#666;margin-top:6px}
.empty{text-align:center;padding:30px;color:#555}
.filters{margin-bottom:15px}.filters input{width:100%;padding:10px;background:#0d0d15;border:1px solid #252530;border-radius:8px;color:#fff}
.alert{padding:10px;border-radius:8px;text-align:center;font-size:12px;margin:8px 0}
.alert-error{background:rgba(244,67,54,0.15);color:#f44336}.alert-success{background:rgba(76,175,80,0.15);color:#4caf50}
.alert-warning{background:rgba(255,152,0,0.15);color:#ff9800}
.ban-item{display:flex;justify-content:space-between;padding:8px;background:#0d0d15;border-radius:6px;margin-bottom:5px;font-size:12px}
.id-chip{background:#0d0d15;border:1px solid #333;border-radius:6px;padding:4px 8px;font-size:10px;color:#888;display:inline-block;margin-top:4px}
.rules ol{padding-left:18px;line-height:1.8;color:#ccc;font-size:13px}
.footer{text-align:center;padding:15px;color:#555;font-size:11px;border-top:1px solid #222;margin-top:20px}
.footer a{color:#e91e63;text-decoration:none}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:200;justify-content:center;align-items:center}
.modal.show{display:flex}.modal img{max-width:90%;max-height:90%;border-radius:10px}
.modal-close{position:absolute;top:15px;right:25px;color:#fff;font-size:28px;cursor:pointer}
.my-id-box{background:#0d0d15;border:1px solid #2196F3;border-radius:8px;padding:10px;margin-bottom:15px;font-size:11px;color:#888}
.my-id-box span{color:#2196F3;font-weight:bold}
.announce-card{background:#16161f;border:1px solid #ff9800;border-radius:12px;padding:15px;margin-bottom:10px}
.announce-card .card-title{color:#ff9800}
.status{font-size:10px;padding:3px 8px;border-radius:10px;display:inline-block;margin-left:8px}
.status-online{background:rgba(76,175,80,0.2);color:#4caf50}
.status-offline{background:rgba(244,67,54,0.2);color:#f44336}
</style>
</head>
<body>
<div class="header"><div class="logo">🏪 TSUM MARKET <span class="status" id="connStatus">🟡</span></div>
<div class="nav"><button class="active" id="nav-reviews">⭐ Отзывы</button><button id="nav-announce">📢 Объявления</button><button id="nav-submit">📝 Оставить</button><button id="nav-rules">📜 Правила</button><button id="nav-admin">🔒 Админ</button></div></div>
<div class="container">
<div class="tab active" id="tab-reviews"><div class="filters"><input type="text" id="searchReviews" placeholder="🔍 Поиск..." oninput="showApproved()"></div><div class="card"><div class="card-title">⭐ Отзывы (<span id="reviewCount">0</span>)</div><div id="reviewsList"><div class="empty">Нет отзывов</div></div></div></div>
<div class="tab" id="tab-announce"><div class="card"><div class="card-title">📢 Объявления</div><div id="announceList"><div class="empty">Нет объявлений</div></div></div></div>
<div class="tab" id="tab-submit"><div class="card"><div class="card-title">📝 Оставить отзыв</div><div class="my-id-box">🆔 Ваш ID: <span id="myIdDisplay">-</span></div><div style="display:flex;gap:10px;flex-wrap:wrap;"><div style="flex:1;min-width:140px;"><label>🎮 Ваш ник</label><input type="text" id="myRoblox"></div><div style="flex:1;min-width:140px;"><label>🎮 Ник продавца</label><input type="text" id="robloxNick"></div></div><div style="display:flex;gap:10px;flex-wrap:wrap;"><div style="flex:1;min-width:140px;"><label>💬 Discord</label><input type="text" id="discordNick"></div><div style="flex:1;min-width:140px;"><label>⭐ Оценка</label><select id="rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div></div><div><label>💬 Отзыв</label><textarea id="reviewText"></textarea></div><div style="display:flex;gap:10px;flex-wrap:wrap;"><div style="flex:1;min-width:140px;"><label>💬 Переписка</label><div class="upload-area" onclick="document.getElementById('chatInput').click()"><div class="upload-icon">📸</div><div class="file-list" id="chatFiles"></div></div><input type="file" id="chatInput" accept="image/*" multiple style="display:none;" onchange="addFiles(this,'chat')"></div><div style="flex:1;min-width:140px;"><label>💰 Передача</label><div class="upload-area" onclick="document.getElementById('tradeInput').click()"><div class="upload-icon">📸</div><div class="file-list" id="tradeFiles"></div></div><input type="file" id="tradeInput" accept="image/*" multiple style="display:none;" onchange="addFiles(this,'trade')"></div></div><button class="btn btn-pink" onclick="submitReview()">📩 ОТПРАВИТЬ НА МОДЕРАЦИЮ</button><div id="submitMsg"></div></div></div>
<div class="tab" id="tab-rules"><div class="card rules"><div class="card-title">📜 Правила</div><ol><li>Указывай реальный ник.</li><li>Одна заявка на продавца.</li><li>Скриншоты обязательны.</li></ol></div></div>
<div class="tab" id="tab-admin"><div class="card"><div class="card-title">🔒 Вход</div><input type="password" id="adminPass" placeholder="Пароль"><button class="btn btn-pink" onclick="adminLogin()">🔓 ВОЙТИ</button><div id="adminMsg"></div></div><div id="adminPanel" style="display:none;"><div class="card"><div class="card-title">📋 Модерация (<span id="pendingCount">0</span>)</div><div id="pendingList"></div></div><div class="card"><div class="card-title">🚫 Бан по ID</div><div style="display:flex;gap:10px;"><input type="text" id="banId" placeholder="ID"><select id="banType"><option value="ban">🔴 БАН</option><option value="mute">🟠 МУТ</option></select></div><button class="btn btn-red" onclick="addBan()">🚫 ПРИМЕНИТЬ</button><button class="btn btn-green" onclick="removeBan()">✅ СНЯТЬ</button><div id="banList" style="margin-top:10px;"></div></div></div></div>
</div>
<div class="modal" id="photoModal" onclick="this.classList.remove('show')"><span class="modal-close">✕</span><img id="modalImage" src=""></div>
<div class="footer">© 2024 TSUM MARKET • <a href="https://t.me/instapumpov" target="_blank">@instapumpov</a></div>

<script>
var URL='https://wrtrjeqvsnnmpzslouwp.supabase.co/rest/v1/tsum_data?id=eq.1';
var KEY='sb_publishable_-CPlGbNuigRIsnAJXU_q_A_kpVKKe3u';
var H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};

var P=[],A=[],B=[],M=[],chatP=[],tradeP=[],PASS='acer2026',myId='',isAdmin=false;

function getMyId(){var id=localStorage.getItem('tsum_myId');if(!id){id='usr_'+Date.now().toString(36)+'_'+Math.random().toString(36).substring(2,8);localStorage.setItem('tsum_myId',id);}return id;}

async function loadFromServer(){
    try{
        var r=await fetch(URL,{headers:H});
        if(!r.ok)throw new Error(r.status);
        var d=await r.json();
        if(d.length>0&&d[0].data){var x=d[0].data;P=x.P||[];A=x.A||[];B=x.B||[];M=x.M||[];}
        document.getElementById('connStatus').innerHTML='🟢';document.getElementById('connStatus').className='status status-online';
    }catch(e){
        document.getElementById('connStatus').innerHTML='🔴';document.getElementById('connStatus').className='status status-offline';
        console.log(e);
    }
    myId=getMyId();document.getElementById('myIdDisplay').textContent=myId;
    showApproved();
}

async function saveToServer(){
    try{
        var body={data:{P:P,A:A,B:B,M:M}};
        var r=await fetch(URL,{method:'PATCH',headers:H,body:JSON.stringify(body)});
        return r.ok;
    }catch(e){return false;}
}

function addFiles(input,type){var files=input.files;var arr=type==='chat'?chatP:tradeP;if(arr.length+files.length>5){alert('Макс 5');return;}for(var i=0;i<files.length;i++){var f=files[i];if(f.size>5*1024*1024){alert('>5MB');continue;}var reader=new FileReader();reader.onload=function(e){arr.push({name:f.name,data:e.target.result,id:Date.now()+Math.random()});showFiles(type);};reader.readAsDataURL(f);}}
function showFiles(type){var arr=type==='chat'?chatP:tradeP;var div=document.getElementById(type==='chat'?'chatFiles':'tradeFiles');var h='';for(var i=0;i<arr.length;i++){h+='<div class="file-chip">📷 '+(i+1)+' <button onclick="removeFile(\''+type+'\','+i+')">✕</button></div>';}div.innerHTML=h;}
function removeFile(type,index){if(type==='chat')chatP.splice(index,1);else tradeP.splice(index,1);showFiles(type);}

async function submitReview(){
    var author=document.getElementById('myRoblox').value.trim();var roblox=document.getElementById('robloxNick').value.trim();
    var discord=document.getElementById('discordNick').value.trim();var rating=document.getElementById('rating').value;
    var text=document.getElementById('reviewText').value.trim();var msg=document.getElementById('submitMsg');
    if(!author||!roblox||!text){msg.innerHTML='<div class="alert alert-error">Заполни все поля!</div>';return;}
    for(var i=0;i<B.length;i++){if(B[i]===myId){msg.innerHTML='<div class="alert alert-error">Вы забанены!</div>';return;}}
    for(var i=0;i<P.length;i++){if(P[i].roblox.toLowerCase()===roblox.toLowerCase()){msg.innerHTML='<div class="alert alert-warning">Уже на модерации!</div>';return;}}
    for(var i=0;i<A.length;i++){if(A[i].roblox.toLowerCase()===roblox.toLowerCase()){msg.innerHTML='<div class="alert alert-success">Уже одобрен!</div>';return;}}
    P.unshift({id:Date.now(),author:author,authorId:myId,roblox:roblox,discord:discord,rating:rating,text:text,status:'pending',date:new Date().toISOString(),chatPhotos:[],tradePhotos:[]});
    msg.innerHTML='<span style="color:#ff9800;">Сохранение...</span>';
    var ok=await saveToServer();
    document.getElementById('reviewText').value='';
    if(ok){msg.innerHTML='<div class="alert alert-success">✅ Отправлено!</div>';loadFromServer();}
    else{msg.innerHTML='<div class="alert alert-error">❌ Ошибка!</div>';P.shift();}
}

function showApproved(){
    var q=document.getElementById('searchReviews').value.toLowerCase();
    var f=[];for(var i=0;i<A.length;i++){var mu=false;for(var j=0;j<M.length;j++){if(M[j]===A[i].authorId)mu=true;}if(!mu)f.push(A[i]);}
    if(q){var t=[];for(var i=0;i<f.length;i++){if(f[i].roblox.toLowerCase().indexOf(q)>=0)t.push(f[i]);}f=t;}
    document.getElementById('reviewCount').textContent=f.length;
    var d=document.getElementById('reviewsList');if(f.length===0){d.innerHTML='<div class="empty">📭 Нет отзывов</div>';return;}
    var h='';for(var i=0;i<f.length;i++){var r=f[i];h+='<div class="review-card"><div class="review-header"><div class="user-info"><div class="avatar">'+r.roblox.substring(0,2).toUpperCase()+'</div><div><h4>🎮 '+r.roblox+'</h4></div></div></div><div class="review-text">⭐'+r.rating+' — '+r.text+'</div><div style="font-size:10px;color:#888;">Автор: '+r.author+'</div><div class="review-footer">📅 '+new Date(r.date).toLocaleString('ru-RU')+'</div></div>';}d.innerHTML=h;
}

function adminLogin(){if(document.getElementById('adminPass').value!==PASS){document.getElementById('adminMsg').innerHTML='<div class="alert alert-error">Неверный пароль!</div>';return;}isAdmin=true;document.getElementById('adminMsg').innerHTML='<div class="alert alert-success">Доступ</div>';document.getElementById('adminPanel').style.display='block';showPending();showBans();}
function showPending(){document.getElementById('pendingCount').textContent=P.length;var d=document.getElementById('pendingList');if(P.length===0){d.innerHTML='<div class="empty">Нет заявок</div>';return;}var h='';for(var i=0;i<P.length;i++){var r=P[i];h+='<div class="review-card" style="border-left:3px solid #ff9800;"><div><b>🎮 '+r.roblox+'</b> | ⭐'+r.rating+'</div><div style="font-size:10px;color:#888;">Автор: '+r.author+'</div><div class="review-text">'+r.text+'</div><div style="display:flex;gap:10px;margin-top:10px;"><button class="btn btn-green btn-sm" style="flex:1;" onclick="approve('+r.id+')">✅ ОДОБРИТЬ</button><button class="btn btn-red btn-sm" style="flex:1;" onclick="reject('+r.id+')">❌ ОТКЛОНИТЬ</button></div></div>';}d.innerHTML=h;}
async function approve(id){var f=null,np=[];for(var i=0;i<P.length;i++){if(P[i].id===id)f=P[i];else np.push(P[i]);}if(f){P=np;f.status='approved';A.unshift(f);await saveToServer();showPending();showApproved();}}
async function reject(id){var np=[];for(var i=0;i<P.length;i++){if(P[i].id!==id)np.push(P[i]);}P=np;await saveToServer();showPending();}

async function addBan(){var id=document.getElementById('banId').value.trim();if(!id)return;B.push(id);await saveToServer();showBans();document.getElementById('banId').value='';}
async function removeBan(){var id=document.getElementById('banId').value.trim();if(!id)return;var nb=[];for(var i=0;i<B.length;i++){if(B[i]!==id)nb.push(B[i]);}B=nb;await saveToServer();showBans();document.getElementById('banId').value='';}
function showBans(){var d=document.getElementById('banList');if(B.length===0){d.innerHTML='<div style="color:#888;">Нет банов</div>';return;}var h='';for(var i=0;i<B.length;i++){h+='<div class="ban-item"><span>🆔 '+B[i]+'</span></div>';}d.innerHTML=h;}

function switchTab(name){
    document.getElementById('nav-reviews').classList.remove('active');document.getElementById('nav-announce').classList.remove('active');
    document.getElementById('nav-submit').classList.remove('active');document.getElementById('nav-rules').classList.remove('active');
    document.getElementById('nav-admin').classList.remove('active');document.getElementById('nav-'+name).classList.add('active');
    document.getElementById('tab-reviews').classList.remove('active');document.getElementById('tab-announce').classList.remove('active');
    document.getElementById('tab-submit').classList.remove('active');document.getElementById('tab-rules').classList.remove('active');
    document.getElementById('tab-admin').classList.remove('active');document.getElementById('tab-'+name).classList.add('active');
    if(name==='reviews')showApproved();
    if(name==='admin'){if(isAdmin){showPending();showBans();}}
}
document.getElementById('nav-reviews').onclick=function(){switchTab('reviews');};
document.getElementById('nav-announce').onclick=function(){switchTab('announce');};
document.getElementById('nav-submit').onclick=function(){switchTab('submit');};
document.getElementById('nav-rules').onclick=function(){switchTab('rules');};
document.getElementById('nav-admin').onclick=function(){switchTab('admin');};

loadFromServer();
setInterval(loadFromServer,30000);
</script>
</body>
</html>
